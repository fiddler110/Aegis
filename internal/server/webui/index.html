<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Aegis</title>
<style>
:root { color-scheme: light dark; --accent:#6d28d9; --bg:#f6f7f9; --panel:#fff; --line:#e5e7eb; --fg:#1c1e21; --muted:#6b7280; }
@media (prefers-color-scheme: dark){ :root{ --bg:#0b0d10; --panel:#15171a; --line:#2a2d31; --fg:#e6e8eb; --muted:#9aa1ab; } }
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{display:flex;font:15px/1.55 -apple-system,system-ui,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--fg)}
#sidebar{width:260px;flex:none;border-right:1px solid var(--line);display:flex;flex-direction:column;background:var(--panel)}
#sidebar header{padding:12px 14px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:8px}
#sidebar header h1{font-size:16px;margin:0;flex:1}
#sessions{overflow-y:auto;flex:1}
.session{padding:10px 14px;border-bottom:1px solid var(--line);cursor:pointer}
.session:hover{background:rgba(125,125,125,.08)}
.session.active{background:rgba(109,40,217,.12)}
.session .t{font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session .m{font-size:12px;color:var(--muted)}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#topbar{padding:10px 16px;border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;background:var(--panel)}
#topbar .title{font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:12px;padding:2px 8px;border-radius:999px;background:rgba(109,40,217,.15);color:var(--accent)}
#transcript{flex:1;overflow-y:auto;padding:18px 16px}
.msg{max-width:820px;margin:0 auto 14px;border-radius:12px;padding:10px 14px}
.msg .role{font-size:12px;font-weight:600;opacity:.7;margin-bottom:5px}
.msg.user{background:rgba(40,90,180,.12)}
.msg.assistant{background:var(--panel);border:1px solid var(--line)}
.msg p{margin:5px 0;white-space:pre-wrap;word-wrap:break-word}
.msg img{max-width:100%;border-radius:8px;margin:6px 0}
details{margin:6px 0}
summary{cursor:pointer;font-size:13px;color:var(--muted)}
details.tool summary{color:var(--accent)}
details.think summary{color:#92400e}
pre{background:#0d1117;color:#e6edf3;padding:9px 11px;border-radius:8px;overflow-x:auto;font:12.5px/1.5 ui-monospace,Menlo,monospace}
#composer{border-top:1px solid var(--line);padding:10px 16px;background:var(--panel);display:flex;gap:8px}
#composer textarea{flex:1;resize:none;height:46px;padding:10px;border-radius:10px;border:1px solid var(--line);background:var(--bg);color:var(--fg);font:inherit}
button{font:inherit;border:0;border-radius:10px;padding:8px 14px;background:var(--accent);color:#fff;cursor:pointer}
button.secondary{background:transparent;color:var(--accent);border:1px solid var(--accent)}
button:disabled{opacity:.5;cursor:default}
.approval{max-width:820px;margin:0 auto 14px;padding:10px 14px;border:1px dashed var(--accent);border-radius:12px}
.approval .q{margin-bottom:8px}
.empty{color:var(--muted);text-align:center;margin-top:60px}
.err{color:#b91c1c}
</style>
</head>
<body>
<aside id="sidebar">
  <header><h1>Aegis</h1><button id="new" class="secondary">+ New</button></header>
  <div id="sessions"></div>
</aside>
<section id="main">
  <div id="topbar"><span class="title" id="title">No session</span><span class="badge" id="mode"></span></div>
  <div id="transcript"><div class="empty">Select or create a session to begin.</div></div>
  <div id="composer">
    <textarea id="input" placeholder="Send a message…  (Enter to send, Shift+Enter for newline)" disabled></textarea>
    <button id="send" disabled>Send</button>
  </div>
</section>
<script>
const TOKEN = "__AEGIS_TOKEN__";
const HDR = { "Authorization": "Bearer " + TOKEN };
let current = null;     // current session id
let streaming = false;

const $ = (id) => document.getElementById(id);
const el = (tag, cls, txt) => { const e = document.createElement(tag); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };

async function api(path, opts = {}) {
  const r = await fetch(path, { ...opts, headers: { ...HDR, ...(opts.headers || {}) } });
  if (!r.ok) throw new Error((await r.text()) || r.status);
  return r;
}

async function loadSessions() {
  try {
    const list = await (await api("/sessions")).json();
    const box = $("sessions"); box.innerHTML = "";
    (list || []).forEach(s => {
      const d = el("div", "session" + (s.id === current ? " active" : ""));
      d.appendChild(el("div", "t", s.title || "(untitled)"));
      d.appendChild(el("div", "m", `${s.mode} · ${new Date(s.updated_at).toLocaleString()}`));
      d.onclick = () => openSession(s.id);
      box.appendChild(d);
    });
  } catch (e) { console.error(e); }
}

async function newSession() {
  const meta = await (await api("/sessions", { method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ mode: "build" }) })).json();
  await loadSessions();
  openSession(meta.id);
}

async function openSession(id) {
  current = id;
  const sess = await (await api("/sessions/" + id)).json();
  $("title").textContent = sess.title || "(untitled)";
  $("mode").textContent = sess.mode;
  $("input").disabled = false; $("send").disabled = false;
  const t = $("transcript"); t.innerHTML = "";
  (sess.messages || []).forEach(m => renderMessage(t, m.role, m.content || []));
  scrollDown();
  loadSessions();
}

function renderMessage(parent, role, blocks) {
  // Tool results live in user messages; render them as standalone tool boxes.
  if (role === "user") {
    const results = blocks.filter(b => b.type === "tool_result");
    results.forEach(r => parent.appendChild(toolResultBox(r)));
    const rest = blocks.filter(b => b.type === "text" || b.type === "image");
    if (!rest.length) return;
    const box = messageBox("user", "🧑 User");
    rest.forEach(b => appendBlock(box.body, b));
    parent.appendChild(box.wrap);
    return;
  }
  const box = messageBox("assistant", "🤖 Assistant");
  let any = false;
  blocks.forEach(b => { if (appendBlock(box.body, b)) any = true; });
  if (any) parent.appendChild(box.wrap);
}

function messageBox(cls, label) {
  const wrap = el("div", "msg " + cls);
  wrap.appendChild(el("div", "role", label));
  const body = el("div", "body");
  wrap.appendChild(body);
  return { wrap, body };
}

function appendBlock(body, b) {
  if (b.type === "text" && b.text) { body.appendChild(el("p", null, b.text)); return true; }
  if (b.type === "thinking" && b.text) {
    const d = el("details", "think"); d.appendChild(el("summary", null, "💭 thinking"));
    d.appendChild(el("p", null, b.text)); body.appendChild(d); return true;
  }
  if (b.type === "tool_use") {
    const d = el("details", "tool"); d.appendChild(el("summary", null, "🔧 " + b.name));
    const pre = el("pre", null, typeof b.input === "string" ? b.input : JSON.stringify(b.input || {}, null, 2));
    d.appendChild(pre); body.appendChild(d); return true;
  }
  if (b.type === "image" && b.data) {
    const img = el("img"); img.src = "data:" + (b.media_type||"image/png") + ";base64," + b.data;
    body.appendChild(img); return true;
  }
  return false;
}

function toolResultBox(r) {
  const d = el("details", "tool");
  const sum = el("summary", null, (r.is_error ? "✗ " : "✓ ") + "tool result");
  if (r.is_error) sum.classList.add("err");
  d.appendChild(sum); d.appendChild(el("pre", null, r.content || ""));
  const w = el("div", "msg assistant"); w.style.maxWidth="820px"; w.appendChild(d); return w;
}

function scrollDown(){ const t=$("transcript"); t.scrollTop = t.scrollHeight; }

async function send() {
  const input = $("input"); const text = input.value.trim();
  if (!text || streaming || !current) return;
  input.value = ""; streaming = true; $("send").disabled = true;

  const t = $("transcript");
  const u = messageBox("user", "🧑 User"); u.body.appendChild(el("p", null, text)); t.appendChild(u.wrap);
  const a = messageBox("assistant", "🤖 Assistant"); t.appendChild(a.wrap);
  let curText = null;
  const addText = (s) => { if (!curText) { curText = el("p"); a.body.appendChild(curText); } curText.textContent += s; scrollDown(); };

  try {
    const r = await api("/sessions/" + current + "/messages", {
      method: "POST", headers: {"Content-Type":"application/json"}, body: JSON.stringify({ text })
    });
    await consumeSSE(r, (ev) => handleEvent(ev, a.body, addText, () => { curText = null; }));
  } catch (e) {
    a.body.appendChild(el("p", "err", "Error: " + e.message));
  } finally {
    streaming = false; $("send").disabled = false; loadSessions(); scrollDown();
  }
}

function handleEvent(ev, body, addText, resetText) {
  switch (ev.kind) {
    case "text": addText(ev.text || ""); break;
    case "thinking": break; // omit live thinking for brevity
    case "tool_call": {
      resetText();
      const d = el("details", "tool"); d.appendChild(el("summary", null, "🔧 " + (ev.tool||"")));
      d.appendChild(el("pre", null, ev.tool_input ? JSON.stringify(ev.tool_input, null, 2) : ""));
      body.appendChild(d); scrollDown(); break;
    }
    case "tool_result": {
      const d = el("details", "tool");
      const sum = el("summary", null, (ev.tool_is_error ? "✗ " : "✓ ") + (ev.tool||"tool") + " result");
      if (ev.tool_is_error) sum.classList.add("err");
      d.appendChild(sum); d.appendChild(el("pre", null, ev.tool_result || "")); body.appendChild(d); scrollDown(); break;
    }
    case "approval_request": renderApproval(body, ev); break;
    case "error": body.appendChild(el("p", "err", "Error: " + (ev.error||""))); break;
  }
}

function renderApproval(body, ev) {
  const box = el("div", "approval");
  box.appendChild(el("div", "q", "⚠️ " + (ev.approval_reason || ("Run " + ev.tool + "?"))));
  const allow = el("button", null, "Allow");
  const reject = el("button", "secondary", "Reject");
  const answer = async (ok) => {
    allow.disabled = reject.disabled = true;
    try { await api("/sessions/" + current + "/approve", { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ approved: ok, id: ev.approval_id }) }); }
    catch(e){ box.appendChild(el("p","err",e.message)); }
    box.appendChild(el("div","m", ok ? "Allowed." : "Rejected."));
  };
  allow.onclick = () => answer(true); reject.onclick = () => answer(false);
  box.appendChild(allow); box.appendChild(document.createTextNode(" ")); box.appendChild(reject);
  body.appendChild(box); scrollDown();
}

// consumeSSE reads a text/event-stream POST response and calls cb per JSON event.
async function consumeSSE(resp, cb) {
  const reader = resp.body.getReader();
  const dec = new TextDecoder();
  let buf = "";
  for (;;) {
    const { value, done } = await reader.read();
    if (done) break;
    buf += dec.decode(value, { stream: true });
    let idx;
    while ((idx = buf.indexOf("\n")) >= 0) {
      const line = buf.slice(0, idx); buf = buf.slice(idx + 1);
      const m = line.match(/^data:\s?(.*)$/);
      if (!m) continue;
      try { cb(JSON.parse(m[1])); } catch {}
    }
  }
}

$("new").onclick = newSession;
$("send").onclick = send;
$("input").addEventListener("keydown", (e) => {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); send(); }
});
loadSessions();
</script>
</body>
</html>
